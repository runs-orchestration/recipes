name: Migrate Spring Boot 3 -> 4
on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Source repository (owner/repo)"
        required: true
      pr_number:
        description: "Pull request number"
        required: true
      callback_url:
        description: "URL to call to complete the check run"
        required: true
concurrency:
  group: update-spring-boot-3-to-4-${{ github.event.inputs.repository }}
  cancel-in-progress: true #this will cancel previous runs
jobs:
  migration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repository }}

      - name: openrewrite --recipe org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_5
        run: sleep 3s
        
      - name: claude -p "Verify SpringBoot upgrade" --allowedTools "Read,Edit,Bash"
        run: sleep 3s

      - name: Complete check run
        if: always()
        run: |
          conclusion=${{ job.status == 'success' && 'success' || 'failure' }}
          curl -s -X POST "${{ github.event.inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d "{\"conclusion\": \"${conclusion}\"}"
